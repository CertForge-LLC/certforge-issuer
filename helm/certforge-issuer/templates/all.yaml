apiVersion: v1
kind: Namespace
metadata:
  name: certforge-system
---
{{- if .Values.tokenSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tokenSecret.name }}
  namespace: certforge-system
stringData:
  token: {{ .Values.certforge.token | quote }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: certforge-issuer
  namespace: certforge-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: certforge-issuer
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["signers"]
    verbs: ["approve"]
    resourceNames:
      - "certforgeissuers.certforge.io/*"
      - "certforgeclusterissuers.certforge.io/*"
  - apiGroups: ["certforge.io"]
    resources: ["certforgeissuers", "certforgeclusterissuers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certforge.io"]
    resources: ["certforgeissuers/status", "certforgeclusterissuers/status"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: certforge-issuer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: certforge-issuer
subjects:
  - kind: ServiceAccount
    name: certforge-issuer
    namespace: certforge-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certforge-issuer
  namespace: certforge-system
  labels:
    app: certforge-issuer
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: certforge-issuer
  template:
    metadata:
      labels:
        app: certforge-issuer
    spec:
      serviceAccountName: certforge-issuer
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.leaderElect }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      terminationGracePeriodSeconds: 10
