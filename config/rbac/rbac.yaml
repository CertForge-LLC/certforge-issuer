apiVersion: v1
kind: Namespace
metadata:
  name: certforge-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: certforge-issuer
  namespace: certforge-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: certforge-issuer
rules:
  # Watch and update CertificateRequests (cert-manager)
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/status"]
    verbs: ["update", "patch"]
  # Approve CertificateRequests on behalf of our issuers
  - apiGroups: ["cert-manager.io"]
    resources: ["signers"]
    verbs: ["approve"]
    resourceNames:
      - "certforgeissuers.certforge.io/*"
      - "certforgeclusterissuers.certforge.io/*"
  # Manage our own CRDs
  - apiGroups: ["certforge.io"]
    resources: ["certforgeissuers", "certforgeclusterissuers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certforge.io"]
    resources: ["certforgeissuers/status", "certforgeclusterissuers/status"]
    verbs: ["update", "patch"]
  # Read credential Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: certforge-issuer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: certforge-issuer
subjects:
  - kind: ServiceAccount
    name: certforge-issuer
    namespace: certforge-system
